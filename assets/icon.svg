<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f9b8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#53d8c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Mainframe symbol — stylized terminal -->
  <rect x="24" y="28" width="80" height="56" rx="6" ry="6" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <!-- Screen content lines -->
  <line x1="32" y1="42" x2="72" y2="42" stroke="#0f9b8e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="88" y2="52" stroke="#53d8c7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="62" x2="60" y2="62" stroke="#53d8c7" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="72" x2="78" y2="72" stroke="#0f9b8e" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Cursor blink -->
  <rect x="80" y="39" width="8" height="12" rx="1" fill="#53d8c7" opacity="0.9"/>
  <!-- Base / stand -->
  <rect x="44" y="88" width="40" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
  <!-- Chat bubble -->
  <circle cx="98" cy="30" r="16" fill="#0f9b8e" opacity="0.9"/>
  <text x="98" y="35" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">z</text>
  <!-- Label -->
  <text x="64" y="112" text-anchor="middle" fill="#53d8c7" font-family="monospace" font-size="11" opacity="0.9">z/OS</text>
</svg>
